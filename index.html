<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 문제풀이</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7DF9B6;
    --accent2: #5BC4FF;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --danger: #ff6b6b;
    --warn: #ffd166;
    --radius: 14px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .hdr-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .hdr-title span { color: var(--accent); }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 10px;
    transition: all 0.3s;
  }
  .status-pill.ok { color: var(--accent); border-color: rgba(125,249,182,0.25); }
  .status-pill.busy { color: var(--warn); border-color: rgba(255,209,102,0.25); }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .dot.ok { background: var(--accent); animation: none; }
  .dot.busy { background: var(--warn); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── API BAR ── */
  .api-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .api-input:focus { border-color: rgba(125,249,182,0.4); }
  .api-input::placeholder { color: var(--muted); }
  .btn-save {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-save:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save.saved { border-color: rgba(125,249,182,0.4); color: var(--accent); }

  /* ── MODEL SELECT ── */
  .model-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .model-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
    white-space: nowrap;
  }
  .model-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .model-tab {
    flex: 1;
    padding: 5px 6px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .model-tab .rpm { display: block; font-size: 9px; opacity: 0.6; }
  .model-tab.active { background: rgba(125,249,182,0.08); border-color: rgba(125,249,182,0.3); color: var(--accent); }

  /* ── CAMERA ── */
  .cam-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 12px;
  }
  .viewfinder {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border2);
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .cam-idle {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
  }
  .cam-idle svg { opacity: 0.3; }
  .cam-idle p { font-size: 13px; }

  /* corner brackets */
  .bracket {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
    pointer-events: none;
  }
  .bracket.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .bracket.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .bracket.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .bracket.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* scan line */
  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0;
    opacity: 0;
    transition: none;
  }
  .scanline.run {
    opacity: 0.7;
    animation: scan 1.8s ease-in-out infinite;
  }
  @keyframes scan {
    0% { top: 10%; }
    100% { top: 90%; }
  }

  /* answer overlay */
  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 70%, transparent);
    padding: 28px 14px 14px;
    display: none;
    max-height: 60%;
    overflow-y: auto;
  }
  .overlay.show { display: block; }
  .overlay-label {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .overlay-text {
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    color: #fff;
    white-space: pre-wrap;
  }

  /* ── CONTROLS ── */
  .controls {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .btn {
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 11px 14px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-shutter {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid rgba(255,255,255,0.2);
    color: #000;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 0 0 0 rgba(125,249,182,0.4);
  }
  .btn-shutter:hover { transform: scale(1.06); box-shadow: 0 0 0 8px rgba(125,249,182,0.15); }
  .btn-shutter:active { transform: scale(0.95); }
  .btn-shutter:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-shutter.thinking {
    background: var(--warn);
    animation: pulse-btn 1s infinite;
  }
  @keyframes pulse-btn { 0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,0.4)} 50%{box-shadow:0 0 0 10px rgba(255,209,102,0)} }

  /* ── ANSWER CARD ── */
  .answer-card {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: none;
    animation: slide-up 0.3s ease;
  }
  @keyframes slide-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .answer-card.show { display: block; }
  .answer-card-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .answer-card-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .answer-thumb {
    width: 52px;
    height: 40px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border2);
    opacity: 0.7;
  }
  .answer-text {
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── FOOTER TIP ── */
  .tip {
    text-align: center;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    padding: 4px 14px 14px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  /* usage counter */
  .usage-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
  }
  .usage-count { color: var(--accent2); font-weight: 500; }

  @media (min-height: 700px) {
    .cam-wrap { padding: 18px; gap: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">AI<span>·</span>문제풀이</div>
  <div class="status-pill" id="statusPill">
    <div class="dot" id="dot"></div>
    <span id="statusText">키 없음</span>
  </div>
</div>

<!-- API KEY -->
<div class="api-bar">
  <div class="api-label">API KEY</div>
  <input class="api-input" type="password" id="apiKey" placeholder="AIza... (Gemini API 키 입력)" autocomplete="off" />
  <button class="btn-save" id="saveBtn" onclick="saveKey()">저장</button>
</div>

<!-- MODEL SELECT -->
<div class="model-bar">
  <div class="model-label">MODEL</div>
  <div class="model-tabs">
    <button class="model-tab active" data-model="gemini-2.5-flash-lite-preview-06-17" onclick="setModel(this)">
      Flash-Lite
      <span class="rpm">1000/일 무료</span>
    </button>
    <button class="model-tab" data-model="gemini-2.5-flash-preview-05-20" onclick="setModel(this)">
      Flash
      <span class="rpm">250/일 무료</span>
    </button>
    <button class="model-tab" data-model="gemini-2.5-pro-preview-06-05" onclick="setModel(this)">
      Pro
      <span class="rpm">100/일 무료</span>
    </button>
  </div>
</div>

<!-- CAMERA -->
<div class="cam-wrap">
  <div class="viewfinder">
    <video id="video" autoplay playsinline></video>
    <div class="cam-idle" id="idle">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="6" y="14" width="36" height="26" rx="4" stroke="#7DF9B6" stroke-width="2"/>
        <circle cx="24" cy="27" r="7" stroke="#7DF9B6" stroke-width="2"/>
        <path d="M18 14l3-5h6l3 5" stroke="#7DF9B6" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <p>카메라 시작을 눌러주세요</p>
    </div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div class="scanline" id="scanline"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-label">▸ AI 답변</div>
      <div class="overlay-text" id="overlayText"></div>
    </div>
  </div>
  <canvas id="canvas" style="display:none"></canvas>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" id="camBtn" onclick="toggleCamera()">카메라 시작</button>
    <button class="btn-shutter" id="shutterBtn" onclick="shoot()" disabled title="문제 분석">
      📸
    </button>
    <button class="btn" onclick="clearAnswer()" id="clearBtn" style="opacity:0.4">초기화</button>
  </div>

  <!-- ANSWER CARD -->
  <div class="answer-card" id="answerCard">
    <div class="answer-card-hdr">
      <div class="answer-card-label">▸ 답</div>
      <img class="answer-thumb" id="thumb" src="" alt="" />
    </div>
    <div class="answer-text" id="answerText"></div>
  </div>

  <div class="tip" id="tip">문제를 화면에 맞추고 📸 버튼을 누르세요</div>
</div>

<!-- USAGE BAR -->
<div class="usage-bar">
  <span>오늘 사용</span>
  <span><span class="usage-count" id="useCount">0</span>회 분석</span>
</div>

<script>
let stream = null;
let apiKey = '';
let selectedModel = 'gemini-2.5-flash-lite-preview-06-17';
let useCount = parseInt(localStorage.getItem('aiUseCount') || '0');
let lastDate = localStorage.getItem('aiUseDate') || '';

// 날짜 리셋
const today = new Date().toDateString();
if (lastDate !== today) { useCount = 0; localStorage.setItem('aiUseDate', today); }
document.getElementById('useCount').textContent = useCount;

function setStatus(mode, text) {
  const pill = document.getElementById('statusPill');
  const dot = document.getElementById('dot');
  pill.className = 'status-pill ' + mode;
  dot.className = 'dot ' + mode;
  document.getElementById('statusText').textContent = text;
}

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('saveBtn');
  if (apiKey.length > 20) {
    btn.textContent = '✓';
    btn.className = 'btn-save saved';
    setStatus('ok', '준비');
    // 저장 (세션만, 보안상 localStorage엔 안 저장)
  } else {
    btn.textContent = '재시도';
    setStatus('', '키 오류');
    alert('API 키가 너무 짧습니다. AIza... 로 시작하는 키를 붙여넣으세요.');
  }
}

function setModel(el) {
  document.querySelectorAll('.model-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedModel = el.dataset.model;
}

async function toggleCamera() {
  if (stream) { stopCam(); return; }
  if (!apiKey) { alert('먼저 API 키를 입력하고 저장해주세요!'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = stream;
    document.getElementById('idle').style.display = 'none';
    document.getElementById('camBtn').textContent = '카메라 종료';
    document.getElementById('shutterBtn').disabled = false;
    setStatus('ok', '준비');
  } catch(e) {
    alert('카메라 접근 실패.\n브라우저 설정에서 카메라 권한을 허용해주세요.\n\n오류: ' + e.message);
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const v = document.getElementById('video');
  v.srcObject = null;
  document.getElementById('idle').style.display = 'flex';
  document.getElementById('camBtn').textContent = '카메라 시작';
  document.getElementById('shutterBtn').disabled = true;
  document.getElementById('scanline').className = 'scanline';
  setStatus('', apiKey ? '준비' : '키 없음');
}

function clearAnswer() {
  document.getElementById('answerCard').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('clearBtn').style.opacity = '0.4';
  document.getElementById('tip').textContent = '문제를 화면에 맞추고 📸 버튼을 누르세요';
}

async function shoot() {
  if (!apiKey) { alert('API 키를 먼저 저장해주세요.'); return; }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // 이미지 크기 제한 (토큰 절약: 640px)
  const MAX = 640;
  const ratio = Math.min(MAX / video.videoWidth, MAX / video.videoHeight, 1);
  canvas.width = Math.round(video.videoWidth * ratio);
  canvas.height = Math.round(video.videoHeight * ratio);
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

  // JPEG 품질 0.7 (충분히 읽을 수 있고 용량 작음)
  const b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

  // UI → thinking
  const shutter = document.getElementById('shutterBtn');
  shutter.disabled = true;
  shutter.classList.add('thinking');
  shutter.textContent = '⏳';
  document.getElementById('scanline').className = 'scanline run';
  setStatus('busy', '분석 중...');

  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');
  document.getElementById('overlayText').textContent = '읽는 중...';

  try {
    const t0 = Date.now();

    // 프롬프트 최소화 (토큰 절약 + 속도 향상)
    const PROMPT = '이 이미지의 문제를 풀어라. 답만 간결하게 번호와 함께 나열해라. 풀이 과정은 쓰지 마라. 문제가 없으면 "문제 없음"이라고만 해라.';

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: PROMPT },
              { inline_data: { mime_type: 'image/jpeg', data: b64 } }
            ]
          }],
          generationConfig: {
            maxOutputTokens: 400,   // 답만이므로 짧게
            temperature: 0.1        // 일관성 높임
          }
        })
      }
    );

    const data = await res.json();
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

    if (data.error) throw new Error(data.error.message);

    const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || '답변 없음';

    // 오버레이
    document.getElementById('overlayText').textContent = answer;

    // 카드
    document.getElementById('thumb').src = canvas.toDataURL('image/jpeg', 0.4);
    document.getElementById('answerText').textContent = answer;
    document.getElementById('answerCard').classList.add('show');
    document.getElementById('clearBtn').style.opacity = '1';

    // 사용 카운트
    useCount++;
    localStorage.setItem('aiUseCount', useCount);
    document.getElementById('useCount').textContent = useCount;

    document.getElementById('tip').textContent = `✓ ${elapsed}초 걸림 · ${selectedModel.includes('lite') ? '남은 무료 약 ' + (1000 - useCount) + '회' : ''}`;
    setStatus('ok', `완료 ${elapsed}s`);

  } catch(e) {
    let msg = e.message;
    if (msg.includes('API_KEY') || msg.includes('invalid')) msg = 'API 키를 확인해주세요';
    if (msg.includes('quota') || msg.includes('429')) msg = '일일 한도 초과 (내일 리셋)';
    if (msg.includes('SAFETY')) msg = '안전 필터에 걸렸습니다';
    document.getElementById('overlayText').textContent = '⚠ ' + msg;
    setStatus('', '오류');
    document.getElementById('tip').textContent = '오류: ' + msg;
  } finally {
    shutter.disabled = false;
    shutter.classList.remove('thinking');
    shutter.textContent = '📸';
    document.getElementById('scanline').className = 'scanline';
  }
}

// Enter 키로도 저장
document.getElementById('apiKey').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});
</script>
</body>
</html>

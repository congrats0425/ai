<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 문제풀이</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7DF9B6;
    --accent2: #5BC4FF;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --warn: #ffd166;
    --radius: 14px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* HEADER */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
  .hdr-title span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--font-mono); color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px 10px; transition: all 0.3s;
  }
  .status-pill.ok   { color: var(--accent); border-color: rgba(125,249,182,0.25); }
  .status-pill.busy { color: var(--warn);   border-color: rgba(255,209,102,0.25); }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .dot.ok   { background: var(--accent); }
  .dot.busy { background: var(--warn); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TOP PANEL */
  .top-panel { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }

  .api-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-bottom: 1px solid var(--border);
  }
  .row-label {
    font-size: 9px; font-family: var(--font-mono);
    color: var(--muted); letter-spacing: 0.08em; white-space: nowrap;
  }
  .api-input {
    flex: 1; min-width: 0;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text);
    font-family: var(--font-mono); font-size: 12px;
    padding: 6px 10px; outline: none; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: rgba(125,249,182,0.45); }
  .api-input::placeholder { color: var(--muted); }

  .btn-save {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--muted);
    font-family: var(--font-mono); font-size: 11px;
    padding: 6px 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .btn-save:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save.saved { border-color: rgba(125,249,182,0.4); color: var(--accent); }

  .model-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; }
  .model-tabs { display: flex; gap: 4px; flex: 1; }
  .model-tab {
    flex: 1; padding: 5px 4px; border-radius: 7px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font-mono); font-size: 10px;
    cursor: pointer; text-align: center; transition: all 0.2s; line-height: 1.3;
  }
  .model-tab .sub { display: block; font-size: 9px; opacity: 0.55; margin-top: 1px; }
  .model-tab.active {
    background: rgba(125,249,182,0.08);
    border-color: rgba(125,249,182,0.3);
    color: var(--accent);
  }

  /* CAMERA AREA */
  .cam-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 12px; gap: 10px; overflow: hidden;
  }

  .viewfinder {
    position: relative; width: 100%; max-width: 360px;
    aspect-ratio: 3/4;
    background: #000; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border2); flex-shrink: 0;
  }

  #video { width:100%; height:100%; object-fit:cover; display:block; }

  .cam-idle {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--muted);
  }
  .cam-idle svg { opacity: 0.25; }
  .cam-idle p { font-size: 13px; }

  .bracket {
    position: absolute; width: 20px; height: 20px;
    border-color: var(--accent); border-style: solid;
    opacity: 0.4; pointer-events: none; transition: opacity 0.4s;
  }
  .bracket.tl { top:10px;    left:10px;   border-width: 2px 0 0 2px; }
  .bracket.tr { top:10px;    right:10px;  border-width: 2px 2px 0 0; }
  .bracket.bl { bottom:10px; left:10px;   border-width: 0 0 2px 2px; }
  .bracket.br { bottom:10px; right:10px;  border-width: 0 2px 2px 0; }
  .viewfinder.active .bracket { opacity: 1; }

  .scanline {
    position: absolute; left:0; right:0; height:1.5px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top:0; opacity:0;
  }
  .scanline.run { opacity:0.75; animation: scan 1.6s ease-in-out infinite; }
  @keyframes scan { 0%{ top:8%; } 100%{ top:92%; } }

  /* AR 오버레이 */
  .ar-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    pointer-events: none; opacity: 0; transition: opacity 0.4s;
  }
  .ar-overlay.show { opacity: 1; }
  .ar-bg {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
  }
  .ar-content { position: relative; padding: 14px 14px 16px; z-index: 1; }
  .ar-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 9px; font-family: var(--font-mono);
    color: var(--accent); letter-spacing: 0.1em;
    background: rgba(125,249,182,0.1);
    border: 1px solid rgba(125,249,182,0.3);
    border-radius: 99px; padding: 2px 8px; margin-bottom: 8px;
  }
  .ar-tag::before {
    content:''; width:5px; height:5px;
    border-radius:50%; background:var(--accent);
  }
  .ar-tag.live::before { animation: blink 1.1s infinite; }
  .ar-text {
    font-family: var(--font-mono); font-size: 14px; line-height: 1.7;
    color: #fff; white-space: pre-wrap;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    max-height: 180px; overflow-y: auto;
  }

  /* CONTROLS */
  .controls {
    width:100%; max-width:360px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 8px; align-items: center; flex-shrink: 0;
  }
  .btn {
    border-radius: var(--radius); border: 1px solid var(--border2);
    background: var(--surface); color: var(--text);
    font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    padding: 10px 8px; cursor: pointer; transition: all 0.18s; text-align: center;
  }
  .btn:hover  { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-shutter {
    width:64px; height:64px; border-radius:50%;
    background: var(--accent); border: 3px solid rgba(255,255,255,0.18);
    color:#000; font-size:22px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; cursor:pointer; transition:all 0.18s;
    box-shadow: 0 0 0 0 rgba(125,249,182,0.35);
  }
  .btn-shutter:hover  { transform:scale(1.07); box-shadow:0 0 0 8px rgba(125,249,182,0.12); }
  .btn-shutter:active { transform:scale(0.94); }
  .btn-shutter:disabled { opacity:0.3; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-shutter.thinking {
    background: var(--warn);
    animation: pulse-btn 0.9s infinite;
  }
  @keyframes pulse-btn {
    0%,100%{ box-shadow:0 0 0 0 rgba(255,209,102,0.45); }
    50%    { box-shadow:0 0 0 10px rgba(255,209,102,0); }
  }

  /* FOOTER */
  .footer {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 7px 16px; display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .footer-tip  { font-size:11px; font-family:var(--font-mono); color:var(--muted); }
  .footer-count{ font-size:11px; font-family:var(--font-mono); }
  .footer-count span { color:var(--accent2); font-weight:500; }

  canvas { display:none; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">AI<span>·</span>문제풀이</div>
  <div class="status-pill" id="statusPill">
    <div class="dot" id="dot"></div>
    <span id="statusText">키 없음</span>
  </div>
</div>

<!-- TOP PANEL -->
<div class="top-panel">
  <div class="api-row">
    <div class="row-label">API KEY</div>
    <input class="api-input" type="password" id="apiKey"
      placeholder="AIza... (Gemini API 키 붙여넣기)" autocomplete="off" />
    <button class="btn-save" id="saveBtn" onclick="saveKey()">저장</button>
  </div>
  <div class="model-row">
    <div class="row-label">MODEL</div>
    <div class="model-tabs">
      <button class="model-tab active" data-model="gemini-2.5-flash-lite" onclick="setModel(this)">
        Flash-Lite<span class="sub">1000회/일</span>
      </button>
      <button class="model-tab" data-model="gemini-2.5-flash" onclick="setModel(this)">
        Flash<span class="sub">250회/일</span>
      </button>
      <button class="model-tab" data-model="gemini-2.5-pro" onclick="setModel(this)">
        Pro<span class="sub">100회/일</span>
      </button>
    </div>
  </div>
</div>

<!-- CAMERA -->
<div class="cam-wrap">
  <div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline></video>

    <div class="cam-idle" id="idle">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <rect x="6" y="14" width="36" height="26" rx="4" stroke="#7DF9B6" stroke-width="2"/>
        <circle cx="24" cy="27" r="7" stroke="#7DF9B6" stroke-width="2"/>
        <path d="M18 14l3-5h6l3 5" stroke="#7DF9B6" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <p>카메라 시작을 눌러주세요</p>
    </div>

    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div class="scanline" id="scanline"></div>

    <!-- 찍으면 카메라 화면 위에 AR처럼 답 표시 -->
    <div class="ar-overlay" id="arOverlay">
      <div class="ar-bg"></div>
      <div class="ar-content">
        <div class="ar-tag" id="arTag">AI 답변</div>
        <div class="ar-text" id="arText"></div>
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="controls">
    <button class="btn" id="camBtn" onclick="toggleCamera()">카메라 시작</button>
    <button class="btn-shutter" id="shutterBtn" onclick="shoot()" disabled>📸</button>
    <button class="btn" id="clearBtn" onclick="clearAnswer()" style="opacity:0.35">초기화</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-tip" id="tip">문제를 비추고 📸 버튼을 누르세요</div>
  <div class="footer-count">오늘 <span id="useCount">0</span>회</div>
</div>

<script>
let stream = null;
let apiKey = '';
let selectedModel = 'gemini-2.5-flash-lite';

// 날짜별 사용 카운트
let useCount = parseInt(localStorage.getItem('aiUseCount') || '0');
const today = new Date().toDateString();
if (localStorage.getItem('aiUseDate') !== today) {
  useCount = 0;
  localStorage.setItem('aiUseDate', today);
}
document.getElementById('useCount').textContent = useCount;

function setStatus(mode, text) {
  document.getElementById('statusPill').className = 'status-pill ' + mode;
  document.getElementById('dot').className = 'dot ' + mode;
  document.getElementById('statusText').textContent = text;
}

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('saveBtn');
  if (val.length > 20) {
    apiKey = val;
    btn.textContent = '✓ 저장됨';
    btn.className = 'btn-save saved';
    setStatus('ok', '준비');
  } else {
    btn.textContent = '재시도';
    setStatus('', '키 오류');
    alert('API 키 형식을 확인해주세요. (AIza... 형태, 39자)');
  }
}
document.getElementById('apiKey').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

function setModel(el) {
  document.querySelectorAll('.model-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedModel = el.dataset.model;
}

async function toggleCamera() {
  if (stream) { stopCam(); return; }
  if (!apiKey) { alert('먼저 API 키를 입력하고 저장해주세요!'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 960 }, height: { ideal: 1280 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('idle').style.display = 'none';
    document.getElementById('viewfinder').classList.add('active');
    document.getElementById('camBtn').textContent = '종료';
    document.getElementById('shutterBtn').disabled = false;
    setStatus('ok', '준비');
  } catch(e) {
    alert('카메라 접근 실패.\n브라우저에서 카메라 권한을 허용해주세요.\n\n' + e.message);
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
  document.getElementById('idle').style.display = 'flex';
  document.getElementById('viewfinder').classList.remove('active');
  document.getElementById('camBtn').textContent = '카메라 시작';
  document.getElementById('shutterBtn').disabled = true;
  document.getElementById('scanline').className = 'scanline';
  setStatus('', apiKey ? '준비' : '키 없음');
}

function clearAnswer() {
  document.getElementById('arOverlay').classList.remove('show');
  document.getElementById('arTag').className = 'ar-tag';
  document.getElementById('clearBtn').style.opacity = '0.35';
  document.getElementById('tip').textContent = '문제를 비추고 📸 버튼을 누르세요';
}

async function shoot() {
  if (!apiKey) { alert('API 키를 먼저 저장해주세요.'); return; }

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // 긴쪽 720px 기준 리사이즈 (세로 문제집 최적화)
  const MAX = 1024;
  const ratio = Math.min(MAX / video.videoWidth, MAX / video.videoHeight, 1);
  canvas.width  = Math.round(video.videoWidth  * ratio);
  canvas.height = Math.round(video.videoHeight * ratio);
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  const b64 = canvas.toDataURL('image/jpeg', 0.95).split(',')[1];

  // UI → 분석 중
  const shutter = document.getElementById('shutterBtn');
  shutter.disabled = true;
  shutter.classList.add('thinking');
  shutter.textContent = '⏳';
  document.getElementById('scanline').className = 'scanline run';
  setStatus('busy', '분석 중...');

  // AR 오버레이 표시 (읽는 중...)
  document.getElementById('arTag').className = 'ar-tag live';
  document.getElementById('arText').textContent = '읽는 중...';
  document.getElementById('arOverlay').classList.add('show');

  const PROMPT = '이이미지의 문제를 정확히 텍스트로 옮겨라. 그 다음 단계적으로 풀이하고 최종 답을 구해라.
마지막 줄에 "정답:" 뒤에 답만 써라.문제가 없으면 "문제 없음"이라고만 해라.';

  try {
    const t0 = Date.now();
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: PROMPT }, { inline_data: { mime_type: 'image/jpeg', data: b64 } }] }],
          generationConfig: { maxOutputTokens: 400, temperature: 0.1 }
        })
      }
    );

    const data = await res.json();
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    if (data.error) throw new Error(data.error.message);

    const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || '답변 없음';

    // 카메라 화면 위에 AR로 답 표시
    document.getElementById('arTag').className = 'ar-tag';
    document.getElementById('arText').textContent = answer;
    document.getElementById('clearBtn').style.opacity = '1';

    useCount++;
    localStorage.setItem('aiUseCount', useCount);
    document.getElementById('useCount').textContent = useCount;
    document.getElementById('tip').textContent = `✓ ${elapsed}초 완료`;
    setStatus('ok', `완료 ${elapsed}s`);

  } catch(e) {
    let msg = e.message;
    if (msg.includes('API_KEY') || msg.includes('key') || msg.includes('invalid'))
      msg = 'API 키를 확인해주세요';
    if (msg.includes('quota') || msg.includes('429'))
      msg = '일일 한도 초과 — 내일 자정 리셋';
    if (msg.includes('not found') || msg.includes('404'))
      msg = '모델 오류 — Flash-Lite로 바꿔보세요';
    document.getElementById('arTag').className = 'ar-tag';
    document.getElementById('arText').textContent = '⚠ ' + msg;
    setStatus('', '오류');
    document.getElementById('tip').textContent = '오류: ' + msg;
  } finally {
    shutter.disabled = false;
    shutter.classList.remove('thinking');
    shutter.textContent = '📸';
    document.getElementById('scanline').className = 'scanline';
  }
}
</script>
</body>
</html>

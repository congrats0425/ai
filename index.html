<!-- 기존 코드 그대로 유지하고 script 부분만 교체 -->

<script>
let stream = null;
let apiKey = '';
let selectedModel = 'gemini-2.5-flash'; // ✅ 기본 모델 상향

let useCount = parseInt(localStorage.getItem('aiUseCount') || '0');
const today = new Date().toDateString();
if (localStorage.getItem('aiUseDate') !== today) {
  useCount = 0;
  localStorage.setItem('aiUseDate', today);
}
document.getElementById('useCount').textContent = useCount;

function setStatus(mode, text) {
  document.getElementById('statusPill').className = 'status-pill ' + mode;
  document.getElementById('dot').className = 'dot ' + mode;
  document.getElementById('statusText').textContent = text;
}

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('saveBtn');
  if (val.length > 20) {
    apiKey = val;
    btn.textContent = '✓ 저장됨';
    btn.className = 'btn-save saved';
    setStatus('ok', '준비');
  } else {
    btn.textContent = '재시도';
    setStatus('', '키 오류');
    alert('API 키 형식 확인');
  }
}

document.getElementById('apiKey').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

function setModel(el) {
  document.querySelectorAll('.model-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedModel = el.dataset.model;
}

async function toggleCamera() {
  if (stream) { stopCam(); return; }
  if (!apiKey) { alert('API 키 입력'); return; }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });

    document.getElementById('video').srcObject = stream;
    document.getElementById('idle').style.display = 'none';
    document.getElementById('viewfinder').classList.add('active');
    document.getElementById('camBtn').textContent = '종료';
    document.getElementById('shutterBtn').disabled = false;
    setStatus('ok', '준비');

  } catch(e) {
    alert('카메라 실패: ' + e.message);
  }
}

function stopCam() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById('video').srcObject = null;
  document.getElementById('idle').style.display = 'flex';
}

function clearAnswer() {
  document.getElementById('arOverlay').classList.remove('show');
}

async function shoot() {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  // ✅ 해상도 개선
  const MAX = 1024;
  const ratio = Math.min(MAX / video.videoWidth, MAX / video.videoHeight, 1);

  canvas.width  = video.videoWidth  * ratio;
  canvas.height = video.videoHeight * ratio;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ✅ 품질 개선
  const b64 = canvas.toDataURL('image/jpeg', 0.95).split(',')[1];

  document.getElementById('arText').textContent = '분석 중...';
  document.getElementById('arOverlay').classList.add('show');

  // ✅ 핵심: 프롬프트 개선
  const PROMPT = `
이미지의 문제를 정확히 텍스트로 옮겨라.
그 다음 단계적으로 풀이하고 최종 답을 구해라.
마지막 줄에 반드시 "정답:" 형식으로 답만 써라.
`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: PROMPT },
              { inline_data: { mime_type: 'image/jpeg', data: b64 } }
            ]
          }],
          generationConfig: {
            temperature: 0.2,
            maxOutputTokens: 800
          }
        })
      }
    );

    const data = await res.json();
    let answer = data.candidates?.[0]?.content?.parts?.[0]?.text || '답 없음';

    // ✅ "정답:"만 추출
    const match = answer.match(/정답[:：]\s*(.*)/);
    if (match) answer = match[1];

    document.getElementById('arText').textContent = answer;

    useCount++;
    localStorage.setItem('aiUseCount', useCount);
    document.getElementById('useCount').textContent = useCount;

  } catch(e) {
    document.getElementById('arText').textContent = '오류: ' + e.message;
  }
}
</script>
